{% extends "base.html" %}
{% block title %}Edit Transaction - Expense Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title text-primary mb-4">Edit Transaction</h3>

        <form method="POST"
              action="{{ url_for('edit_transaction', transaction_id=transaction.id) }}">
          <div class="mb-3">
            <label class="form-label">Type</label>
            <select name="type" id="type" class="form-select" required>
              <option value="Income"  {% if transaction.type == 'Income' %}selected{% endif %}>Income</option>
              <option value="Expense" {% if transaction.type == 'Expense' %}selected{% endif %}>Expense</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category" id="category" class="form-select" required></select>
          </div>

          <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" name="amount" class="form-control"
                   step="0.01" min="0.01" value="{{ transaction.amount }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <input type="text" name="description" class="form-control"
                   value="{{ transaction.description }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Transaction Date</label>
            <input type="date" name="transaction_date" class="form-control"
                   value="{{ transaction.transaction_date }}" required>
          </div>

          <button type="submit" class="btn btn-primary w-100">Update Transaction</button>
          <a href="{{ url_for('transactions') }}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  const incomeCategories  = {{ income_categories | tojson }};
  const expenseCategories = {{ expense_categories | tojson }};
  const currentCategory   = {{ transaction.category | tojson }};
  const typeSelect = document.getElementById("type");
  const categorySelect = document.getElementById("category");

  function fillCategories() {
    const list = typeSelect.value === "Income" ? incomeCategories : expenseCategories;
    categorySelect.innerHTML = "";
    list.forEach(function (name) {
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      // Keep the saved category selected when the page first loads.
      if (name === currentCategory) {
        option.selected = true;
      }
      categorySelect.appendChild(option);
    });
  }

  typeSelect.addEventListener("change", fillCategories);
  fillCategories();
</script>
{% endblock %}
